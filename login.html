<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>登录 - 明德学院社团管理系统</title>
  <link rel="stylesheet" href="./css/login.css">
</head>

<body>
  <div class="container">
    <div class="brand">
      <h1>明德书院</h1>
      <p>社团与活动报名管理平台</p>
    </div>
    <div class="card">
      <div class="role-switch">
        <button class="role-btn active" data-role="user">普通用户</button>
        <button class="role-btn" data-role="admin">管理员</button>
      </div>
      <div class="tab-switch">
        <button class="tab-btn active" data-tab="login">登 录</button>
        <button class="tab-btn" data-tab="register">注 册</button>
      </div>
      <div class="form-panel active" id="loginPanel">
        <div class="form-group">
          <label>用户名
            <input type="text" id="loginUser" placeholder="请输入用户名" autocomplete="username">
          </label>
        </div>
        <div class="form-group">
          <label>密码
            <input type="password" id="loginPass" placeholder="请输入密码" autocomplete="current-password">
          </label>
        </div>
        <button class="submit-btn" id="loginSubmit">登 录</button>
        <p class="hint">还没有账号？<span id="goRegister">立即注册</span></p>
      </div>
      <div class="form-panel" id="registerPanel">
        <div class="form-group">
          <label>用户名
            <input type="text" id="regUser" placeholder="请输入用户名">
          </label>
        </div>
        <div class="form-group">
          <label>学号
            <input type="text" id="regStuId" placeholder="请输入学号">
          </label>
        </div>
        <div class="form-group">
          <label>密码
            <input type="password" id="regPass" placeholder="请输入密码（至少6位）">
          </label>
        </div>
        <div class="form-group">
          <label>确认密码
            <input type="password" id="regPass2" placeholder="请再次输入密码">
          </label>
        </div>
        <button class="submit-btn" id="regSubmit">注 册</button>
        <p class="hint">已有账号？<span id="goLogin">去登录</span></p>
      </div>
    </div>
  </div>
  <div class="toast" id="toast"></div>

  <script src="./js/login.js"></script>
</body>

</html>
